<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip7 Tracker</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Flip7 Tracker</h1>
            <div class="deck-info">
                <span>Deck: <strong id="cards-remaining">94</strong>/94</span>
                <button id="btn-new-round" class="btn-success btn-sm">Neue Runde</button>
                <button id="btn-reset-deck" class="btn-secondary btn-sm">Deck Mischen</button>
                
                <span style="color: var(--card-border)">|</span>
                
                <button id="btn-export" class="btn-primary btn-sm" title="Spielstand als Datei (.json) speichern">Speichern</button>
                <button id="btn-import-trigger" class="btn-secondary btn-sm" title="Spielstand aus Datei (.json) laden">Laden</button>
                <input type="file" id="file-import" accept=".json" style="display: none">
                
                <span style="color: var(--card-border)">|</span>
                
                <button id="btn-hard-reset" class="btn-danger btn-sm" title="Spiel komplett zurücksetzen">Reset</button>
            </div>
        </header>

        <main class="grid-layout">
            <!-- Left Column: Players & History -->
            <section class="left-col col-flex">
                <div class="panel flex-panel" style="flex: 1">
                    <h2>Spieler</h2>
                    <div id="players-list" class="players-list scrollable"></div>
                    <form id="add-player-form" class="add-player-form mt-auto">
                        <input type="text" id="new-player-name" placeholder="Neuer Spieler..." required>
                        <div style="display: flex; align-items: center; gap: 0.3rem; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); border-radius: 0.4rem; padding: 0 0.4rem;">
                            <input type="checkbox" id="new-player-is-bot" style="margin: 0; cursor: pointer;">
                            <label for="new-player-is-bot" style="font-size: 0.8rem; cursor: pointer; user-select: none;" title="Als KI-Gegner hinzufügen">🤖</label>
                        </div>
                        <button type="submit" class="btn-primary">+</button>
                    </form>
                </div>

                <div class="panel flex-panel" style="flex: 1.5">
                    <h2>Verlauf</h2>
                    <div id="history-list" class="history-list scrollable">
                        <!-- History items go here -->
                    </div>
                </div>
            </section>

            <!-- Middle Column: Current Turn -->
            <section class="middle-col col-flex">
                <div class="panel turn-panel">
                    <div class="turn-header">
                        <h2>Aktueller Tisch</h2>
                        <span id="current-player-display">Kein Spieler ausgewählt</span>
                    </div>
                    
                    <div id="flip3-warning" class="warning-banner" style="display: none;">
                        Muss noch <span id="flip3-count">0</span> Karten ziehen!
                    </div>
                    
                    <div class="drawn-cards-area">
                        <p class="empty-state" id="no-cards-msg">Noch keine Karten gezogen.</p>
                        <div id="drawn-cards" class="cards-container"></div>
                    </div>
                    
                    <div class="turn-stats">
                        <div class="stat-box">
                            <span class="stat-label">Punkte</span>
                            <span class="stat-value" id="turn-points">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Karten</span>
                            <span class="stat-value" id="turn-count">0<span style="font-size: 0.5em; font-weight: normal; color: var(--text-secondary)">/7</span></span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Risiko</span>
                            <span class="stat-value warning" id="bust-prob">0%</span>
                        </div>
                    </div>

                    <div class="turn-actions">
                        <button id="btn-bank" class="btn-success" disabled>Sichern</button>
                        <button id="btn-bust" class="btn-danger" disabled>Fehlschlag</button>
                    </div>
                </div>
                
                <div class="panel flex-panel" style="flex: 1">
                        <button id="btn-draw-random" class="btn-primary" style="width: 100%; padding: 0.6rem; font-size: 1rem; margin-bottom: 1rem; font-weight: 700; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); text-transform: uppercase; letter-spacing: 1px;">🎲 Virtuelle Karte ziehen</button>
                        
                        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem;">
                            <!-- Sonderkarten Links -->
                            <div>
                                <h2 style="font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-secondary); text-transform: uppercase;">Aktion & Bonus</h2>
                                <div class="card-buttons" style="grid-template-columns: repeat(2, 1fr); gap: 0.3rem; margin-bottom: 0.5rem;" id="action-buttons"></div>
                                <div class="card-buttons" style="grid-template-columns: repeat(3, 1fr); gap: 0.3rem;" id="bonus-buttons"></div>
                            </div>
                            
                            <div>
                                <h2 style="font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-secondary); text-transform: uppercase;">Zahlenkarten</h2>
                                <div class="card-buttons" style="grid-template-columns: repeat(4, 1fr); gap: 0.3rem;" id="number-buttons"></div>
                            </div>
                        </div>
                </div>
            </section>

            <!-- Right Column: Probabilities -->
            <section class="right-col col-flex">
                <div class="panel flex-panel" style="flex: 1">
                    <h2>Wahrscheinlichkeiten</h2>
                    <!-- Der Gesamtbalken -->
                    <div id="prob-stacked-bar" class="stacked-bar-wrapper"></div>
                    <!-- Die Liste -->
                    <div class="prob-list" id="prob-list" style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1)">
                        <!-- Probability rows generated via JS -->
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Modal for Player Selection -->
    <div id="player-select-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">Spieler auswählen</h3>
            <p id="modal-desc">Bitte wähle einen Spieler für diese Aktion aus.</p>
            <div id="modal-player-list" class="modal-players">
                <!-- Players generated via JS -->
            </div>
            <button id="btn-cancel-modal" class="btn-secondary" style="margin-top: 1rem; width: 100%">Abbrechen</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
